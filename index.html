<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Number Puzzle MVP</title>

  <!-- CSS 파일 연결 -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- =========================================================
    [HTML 01] 앱 루트
    - 현재는 퍼즐 화면만 존재
    - 이후 title-screen, result-screen, option-screen 추가 가능
  ========================================================= -->
  <div class="app-shell">
    <section id="titleScreen" class="title-screen active" aria-label="타이틀 화면">
      <div class="title-logo">
        <span class="title-kicker">NUMBER PUZZLE</span>
        <h1 class="title-heading">ONES</h1>
      </div>

      <button id="startButton" class="title-start-button" type="button">
        시작
      </button>

      <button id="optionButton" class="ui-button title-option-button" type="button">
        옵션
      </button>

      <div id="optionModal" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal">
          <h2 class="modal-title">옵션</h2>
          <section class="option-score-panel" aria-label="결과스코어 그래프">
            <div class="option-score-header">
              <span class="result-label">RESULT SCORE</span>
            </div>
            <div id="optionScoreChart" class="score-chart option-score-chart"></div>
          </section>

          <div class="modal-actions">
            <button id="optionCloseButton" class="modal-button primary" type="button">
              닫기
            </button>
          </div>
        </div>
      </div>
    </section>

    <main id="gameScreen" class="game-screen" aria-label="퍼즐 화면">

      <!-- =====================================================
        [HTML 02] 상단 UI
      ====================================================== -->
      <header class="top-ui">
        <button id="pauseButton" class="ui-button pause-button" type="button">
          일시정지
        </button>

        <div class="score-box" aria-live="polite">
          <span class="score-label">SCORE</span>
          <span id="scoreText">0</span>
        </div>

        <button id="restartButton" class="ui-button restart-button" type="button">
          다시시작
        </button>
      </header>

      <!-- =====================================================
        [HTML 03] 플레이 영역
      ====================================================== -->
      <section id="playArea" class="play-area" aria-label="게임 플레이 영역">
        <p class="control-hint">
          탭: 회전<br />
          좌우 스와이프: 이동<br />
          아래 스와이프: 떨어뜨리기
        </p>

        <!-- 보드: 화면 하단 밀착 -->
        <div id="boardWrap" class="board-wrap">

          <!-- 대기 블록 레이어: 보드 바로 위 -->
          <div id="previewLayer" class="preview-layer"></div>

          <!-- 5x5 배경 그리드 -->
          <div id="boardGrid" class="board-grid" aria-hidden="true"></div>

          <!-- 실제 보드 블록 레이어 -->
          <div id="blockLayer" class="block-layer"></div>
        </div>
      </section>

      <!-- =====================================================
        [HTML 04] 게임 종료 팝업
      ====================================================== -->
      <div id="gameOverModal" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal">
          <h2 class="modal-title">게임 종료</h2>
          <p class="modal-message">결과화면으로 이동하겠습니까?</p>

          <div class="modal-actions">
            <button id="gameOverNoButton" class="modal-button" type="button">
              아니오
            </button>
            <button id="gameOverYesButton" class="modal-button primary" type="button">
              예
            </button>
          </div>
        </div>
      </div>

      <!-- =====================================================
        [HTML 05] 일시 정지 팝업
      ====================================================== -->
      <div id="pauseModal" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal">
          <h2 class="modal-title">일시 정지</h2>
          <p class="modal-message">게임을 계속 진행하시겠습니까?</p>

          <div class="modal-actions">
            <button id="pauseRestartButton" class="modal-button" type="button">
              초기화
            </button>
            <button id="resumeButton" class="modal-button primary" type="button">
              계속하기
            </button>
          </div>
        </div>
      </div>

    </main>

    <section id="resultScreen" class="result-screen" aria-label="결과 화면">
      <button id="latestScoreButton" class="latest-score-button" type="button">
        <span class="result-label">LATEST SCORE</span>
        <span id="latestScoreText" class="latest-score-text">0</span>
      </button>

      <section class="score-chart-panel" aria-label="최근 5회 플레이 스코어 비교 그래프">
        <div id="scoreChart" class="score-chart"></div>
      </section>

      <button id="resultRestartButton" class="ui-button result-restart-button" type="button">
        다시 시작하기
      </button>

      <button id="resultTitleButton" class="ui-button result-title-button" type="button">
        타이틀로 가기
      </button>

      <div id="restartConfirmModal" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal">
          <h2 class="modal-title">다시 시작</h2>
          <p class="modal-message">다시 시작하시겠습니까?</p>

          <div class="modal-actions">
            <button id="restartConfirmNoButton" class="modal-button" type="button">
              아니오
            </button>
            <button id="restartConfirmYesButton" class="modal-button primary" type="button">
              예
            </button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- =========================================================
    [JS 연결 순서]
    1. local-storage-adapter.js
      - localStorage 점수 저장 영역

    2. game.js
      - 순수 게임 데이터와 게임 규칙

    3. ui.js
      - DOM 렌더링, 입력 처리, 버튼 처리
  ========================================================= -->
  <script src="./local-storage-adapter.js"></script>
  <script src="./game.js"></script>
  <script src="./ui.js"></script>
</body>
</html>
