<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <!-- 모바일 확대 / 축소 / 더블탭 확대 방지 -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>Number Puzzle</title>

  <!-- CSS 분리 -->
  <link rel="stylesheet" href="./style.css" />

  <!-- JS 분리: 게임 로직 → UI → 앱 연결 순서 -->
  <script defer src="./game-core.js"></script>
  <script defer src="./ui-controller.js"></script>
  <script defer src="./app.js"></script>
</head>

<body>
  <!-- 전체 앱 영역 -->
  <div id="app">

    <!-- 9:16 기준 게임 화면 컨테이너 -->
    <main id="game-viewport">

      <!-- 타이틀 화면 -->
      <section id="title-screen" class="screen active">
        <h1 class="title-logo">NUMBER<br />PUZZLE</h1>

        <button id="start-button" class="main-button center-button">
          시작
        </button>

        <button id="option-button" class="sub-button bottom-left">
          옵션
        </button>
      </section>

      <!-- 퍼즐 화면 -->
      <section id="puzzle-screen" class="screen">
        <!-- 상단 UI -->
        <div class="puzzle-top-ui">
          <button id="pause-button" class="small-button">
            일시정지
          </button>

          <div class="score-area">
            <div class="score-label">SCORE</div>
            <div id="current-score" class="score-value">0</div>
          </div>

          <button id="restart-button" class="small-button">
            다시 시작
          </button>
        </div>

        <!-- 하단 퍼즐 그리드 영역 -->
        <div id="puzzle-grid-area">
          <!-- 5x2 대기 블럭 보드 -->
          <div id="waiting-grid" class="grid waiting-grid"></div>

          <!-- 5x5 실제 숫자블럭 보드 -->
          <div id="board-grid" class="grid board-grid"></div>
        </div>
      </section>

      <!-- 결과 화면 -->
      <section id="result-screen" class="screen">
        <div class="result-top">
          <div class="result-label">LATEST SCORE</div>
          <button id="latest-score-button" class="latest-score-button">0</button>
        </div>

        <div class="graph-area">
          <div class="graph-title">최근 5회 플레이 스코어</div>
          <div id="score-graph" class="score-graph"></div>
        </div>

        <button id="result-restart-button" class="sub-button bottom-left">
          다시 시작
        </button>

        <button id="result-title-button" class="sub-button bottom-right">
          타이틀로
        </button>
      </section>

      <!-- 옵션 팝업 -->
      <div id="option-popup" class="popup-layer hidden">
        <div class="popup-box">
          <h2>옵션</h2>
          <p>추후 사운드, 진동, 계정 연동 옵션을 추가할 수 있습니다.</p>
          <button id="option-close-button" class="main-button">
            닫기
          </button>
        </div>
      </div>

      <!-- 일시정지 팝업 -->
      <div id="pause-popup" class="popup-layer hidden">
        <div class="popup-box">
          <h2>일시정지</h2>

          <button id="pause-restart-button" class="main-button">
            다시 시작
          </button>

          <div class="popup-bottom-buttons">
            <button id="continue-button" class="sub-button">
              계속하기
            </button>

            <button id="pause-title-button" class="sub-button">
              타이틀로
            </button>
          </div>
        </div>
      </div>

      <!-- 공용 예 / 아니오 팝업 -->
      <div id="confirm-popup" class="popup-layer hidden">
        <div class="popup-box">
          <h2 id="confirm-message">확인하시겠습니까?</h2>

          <div class="popup-bottom-buttons">
            <button id="confirm-no-button" class="sub-button">
              아니오
            </button>

            <button id="confirm-yes-button" class="sub-button">
              예
            </button>
          </div>
        </div>
      </div>

    </main>
  </div>
</body>
</html>
